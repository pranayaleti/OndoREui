t-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 [\u0026_svg]:pointer-events-none [\u0026_svg]:size-4 [\u0026_svg]:shrink-0 border bg-background hover:text-accent-foreground h-9 rounded-md px-3 border-primary text-primary hover:bg-primary/10\",\"ref\":null}]}],[\"$\",\"div\",null,{\"className\":\"prose prose-lg prose-invert max-w-none\",\"children\":[[\"$\",\"p\",null,{\"className\":\"lead text-xl text-foreground/70 mb-6\",\"children\":\"Utah's rental market moves fast. Whether you own a single-family rental in Lehi or a multi-unit building in Salt Lake City, these proven tactics help you reduce vacancy, protect your asset, and keep tenants happy.\"}],[\"$\",\"h2\",null,{\"children\":\"Know Utah Landlord-Tenant Law\"}],[\"$\",\"p\",null,{\"children\":\"Utah's Fit Premises Act (Utah Code § 57-22) requires landlords to maintain habitable conditions including adequate heating, plumbing, and structural integrity. Violations can allow tenants to withhold rent or terminate their lease. The state also requires a minimum 3-day notice for non-payment of rent before filing an eviction, and 15-day notice for lease violations. Security deposits must be returned within 30 days of move-out with an itemised deduction list.\"}],[\"$\",\"ul\",null,{\"children\":[[\"$\",\"li\",null,{\"children\":\"Use Utah-specific lease agreements that reference state code — generic templates from other states may be unenforceable\"}],[\"$\",\"li\",null,{\"children\":\"Document all move-in and move-out conditions with timestamped photos\"}],[\"$\",\"li\",null,{\"children\":\"Never deduct normal wear and tear from a security deposit\"}]]}],[\"$\",\"h2\",null,{\"children\":\"Screen Tenants Systematically\"}],[\"$\",\"p\",null,{\"children\":\"A poor tenant selection costs more than a month of vacancy. Run a full report: credit (aim for 650+), criminal background, prior eviction history, and income verification (3× monthly rent is a common minimum). Utah Fair Housing laws prohibit discrimination based on race, colour, national origin, sex, religion, disability, and familial status. Apply the same criteria to every applicant.\"}],[\"$\",\"ul\",null,{\"children\":[[\"$\",\"li\",null,{\"children\":\"Use a written rental application and keep records for at least 3 years\"}],[\"$\",\"li\",null,{\"children\":\"Call previous landlords — not just the current one (who may be motivated to give a glowing reference to move a problem tenant)\"}],[\"$\",\"li\",null,{\"children\":\"Verify employment with a pay stub and a direct call to HR\"}]]}],[\"$\",\"h2\",null,{\"children\":\"Reduce Vacancy with Smart Leasing Timing\"}],[\"$\",\"p\",null,{\"children\":\"Utah rental demand peaks in May–August, driven by the academic calendar (BYU, UVU, U of U) and corporate relocation cycles tied to Silicon Slopes hiring. Structuring leases to expire in spring or early summer maximises your applicant pool. If you have a December expiry, consider a short-term renewal to shift it to spring rather than listing in the slow winter window.\"}],\"$L29\",\"$L2a\",\"$L2b\",\"$L2c\",\"$L2d\",\"$L2e\",\"$L2f\"]}]]}]}]\n"])</script><script>self.__next_f.push([1,"23:[\"$\",\"$L30\",null,{\"children\":[\"$L31\",[\"$\",\"$L32\",null,{\"promise\":\"$@33\"}]]}]\n"])</script><script>self.__next_f.push([1,"29:[\"$\",\"h2\",null,{\"children\":\"Maintain Proactively — Not Reactively\"}]\n2a:[\"$\",\"p\",null,{\"children\":\"Utah's climate creates specific maintenance cycles: freeze-thaw cycles stress foundations and pipes; the hot, dry summers accelerate HVAC wear; and dust from inversions clogs filters faster than the national average. Build a maintenance calendar:\"}]\n2b:[\"$\",\"ul\",null,{\"children\":[[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Spring:\"}],\" HVAC service, irrigation activation, roof inspection after snow load\"]}],[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Summer:\"}],\" Exterior paint, fence, landscaping, gutter cleaning\"]}],[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Fall:\"}],\" Furnace tune-up, pipe insulation, weatherstripping, dryer vent cleaning\"]}],[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Winter:\"}],\" Ice dam prevention, monitor for frozen pipes in crawl spaces\"]}]]}]\n2c:[\"$\",\"p\",null,{\"children\":\"Budget 1–1.5% of property value annually for maintenance on homes built after 2000; 1.5–2% for older stock.\"}]\n2d:[\"$\",\"h2\",null,{\"children\":\"Use a Property Management Platform\"}]\n2e:[\"$\",\"p\",null,{\"children\":\"Manual rent collection, maintenance tracking, and owner reporting is a time sink that grows nonlinearly with every unit you add. Modern PM software automates rent reminders, late fees, maintenance dispatch, and monthly statements. Owners who use a platform typically see 10–15% lower maintenance costs (faster response = smaller repairs) and significantly faster lease-up times from better prospective tenant communication.\"}]\n"])</script><script>self.__next_f.push([1,"2f:[\"$\",\"div\",null,{\"className\":\"not-prose my-8 flex flex-col sm:flex-row gap-4\",\"children\":[[\"$\",\"$L28\",null,{\"href\":\"/property-management\",\"children\":\"Explore Full-Service PM\",\"className\":\"inline-flex items-center justify-center gap-2 whitespace-nowrap text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 [\u0026_svg]:pointer-events-none [\u0026_svg]:size-4 [\u0026_svg]:shrink-0 bg-primary text-primary-foreground hover:bg-primary/90 h-11 rounded-md px-8\",\"ref\":null}],[\"$\",\"$L28\",null,{\"href\":\"/property-management/tenant-screening\",\"children\":\"How We Screen Tenants\",\"className\":\"in
