charged). This distinction matters: \\\"collected\\\" means you only pay when rent actually comes in. Some agreements use \\\"rent due\\\" instead — which means you pay the management fee even during vacancy or non-payment months. Always clarify which basis applies.\"]}],[\"$\",\"ul\",null,{\"children\":[[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"6–8%:\"}],\" Common for larger portfolios (10+ units) or very high-rent properties where the dollar amount is substantial\"]}],[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"8–10%:\"}],\" Most common range for individual single-family rentals and small multifamily in Utah\"]}],[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"10–12%:\"}],\" Sometimes seen for lower-rent properties or more intensive management requirements\"]}],[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Flat fee ($100–$200/mo):\"}],\" Less common, occasionally offered for high-value properties\"]}]]}],[\"$\",\"p\",null,{\"children\":\"On a $2,000/mo rental, the difference between 8% and 10% is $40/month — or $480/year. That adds up across a multi-property portfolio.\"}],[\"$\",\"h2\",null,{\"children\":\"Leasing Fee\"}],[\"$\",\"p\",null,{\"children\":\"The leasing fee is charged every time a new tenant is placed. It compensates the manager for advertising, showing, screening, and preparing the lease. In Utah, typical leasing fees are:\"}],[\"$\",\"ul\",null,{\"children\":[[\"$\",\"li\",null,{\"children\":\"50% of one month's rent (most common)\"}],\"$L2a\",\"$L2b\"]}],\"$L2c\",\"$L2d\",\"$L2e\",\"$L2f\",\"$L30\",\"$L31\",\"$L32\",\"$L33\",\"$L34\",\"$L35\",\"$L36\",\"$L37\",\"$L38\",\"$L39\",\"$L3a\",\"$L3b\",\"$L3c\",\"$L3d\",\"$L3e\",\"$L3f\",\"$L40\"]}]]}]}]\n"])</script><script>self.__next_f.push([1,"24:[\"$\",\"$L41\",null,{\"children\":[\"$L42\",[\"$\",\"$L43\",null,{\"promise\":\"$@44\"}]]}]\n"])</script><script>self.__next_f.push([1,"2a:[\"$\",\"li\",null,{\"children\":\"One full month's rent (higher-end or slower markets)\"}]\n2b:[\"$\",\"li\",null,{\"children\":\"A flat fee of $300–$600\"}]\n2c:[\"$\",\"p\",null,{\"children\":\"If you have an annual tenant turnover (common for shorter lease terms), the leasing fee adds materially to your annual cost. A 50% leasing fee on a $2,000 rental means $1,000 every time you re-tenant — equivalent to an additional 4.2% of annual gross rent on top of your management fee.\"}]\n2d:[\"$\",\"h2\",null,{\"children\":\"Lease Renewal Fee\"}]\n2e:[\"$\",\"p\",null,{\"children\":\"Not all companies charge this, but many do: $100–$350 to prepare and execute a lease renewal with an existing tenant. Given that tenant retention is the most cost-effective vacancy strategy, this fee structure can create misaligned incentives — penalizing you for keeping good tenants. Look for companies that do not charge lease renewal fees, or charge minimal ones.\"}]\n2f:[\"$\",\"h2\",null,{\"children\":\"Maintenance Coordination and Markups\"}]\n30:[\"$\",\"p\",null,{\"children\":\"This is where the largest hidden cost often lives. Many Utah property management companies add a 10–20% markup to every vendor invoice they coordinate. On a $500 plumbing job, that is $50–$100 in additional cost — on top of your management fee. Over a year with normal maintenance, this can add $300–$800+ in invisible fees.\"}]\n31:[\"$\",\"p\",null,{\"children\":\"Questions to ask:\"}]\n32:[\"$\",\"ul\",null,{\"children\":[[\"$\",\"li\",null,{\"children\":\"Do you mark up vendor invoices? If so, by what percentage?\"}],[\"$\",\"li\",null,{\"children\":\"Do you have in-house maintenance staff? (Often cheaper, but quality varies)\"}],[\"$\",\"li\",null,{\"children\":\"What is your authorization limit for repairs without owner approval? (Typically $200–$500)\"}],[\"$\",\"li\",null,{\"children\":\"Can I use my own vendors?\"}]]}]\n33:[\"$\",\"h2\",null,{\"children\":\"Vacancy Fee\"}]\n34:[\"$\",\"p\",null,{\"children\"
