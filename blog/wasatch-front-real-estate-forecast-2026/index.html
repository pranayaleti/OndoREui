ding deeper into 2026? Here is our outlook for owners and investors.\"}],[\"$\",\"h2\",null,{\"children\":\"Interest Rate Environment\"}],[\"$\",\"p\",null,{\"children\":\"The Federal Reserve's rate trajectory remains the most consequential variable for Utah real estate. The 30-year fixed mortgage rate, which peaked above 7.5% in late 2023, has moderated but remains elevated relative to the 2019–2021 era. The current rate environment has two major effects on the Wasatch Front:\"}],[\"$\",\"ul\",null,{\"children\":[[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Demand suppression on the purchase side:\"}],\" Affordability remains stretched for first-time buyers in Salt Lake and Utah counties. The monthly payment on a $500,000 home at 6.75% with 10% down is approximately $3,200/month — well above what a median Utah household qualifies for. This keeps demand in the rental market elevated.\"]}],[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Lock-in effect on the supply side:\"}],\" Homeowners who refinanced at 2.5–3.5% between 2020–2022 are reluctant to sell and take on a new mortgage at 6.5%+. This suppresses resale inventory, keeping competition high for buyers who are in the market.\"]}]]}],[\"$\",\"p\",null,{\"children\":\"The net effect is that both sides of the affordability equation favor continued strong rental demand in 2026. Households that cannot buy — or choose to wait — are renting. And they are renting in Utah at historically low vacancy rates.\"}],[\"$\",\"h2\",null,{\"children\":\"Home Price Outlook\"}],[\"$\",\"p\",null,{\"children\":\"Wasatch Front home prices are expected to see modest appreciation of 2–4% in 2026 after the 2023 correction and 2024 stabilization. The key dynamics:\"}],\"$L2a\",\"$L2b\",\"$L2c\",\"$L2d\",\"$L2e\",\"$L2f\",\"$L30\",\"$L31\",\"$L32\",\"$L33\",\"$L34\",\"$L35\",\"$L36\",\"$L37\",\"$L38\",\"$L39\",\"$L3a\"]}]]}]}]\n"])</script><script>self.__next_f.push([1,"24:[\"$\",\"$L table demand and limited new competition. Owners with well-maintained Class B properties in Midvale, Murray, and West Valley are in a favorable position.\"]}]]}]\n"])</script><script>self.__next_f.push([1,"2e:[\"$\",\"h2\",null,{\"children\":\"Silicon Slopes: The Employment Anchor\"}]\n2f:[\"$\",\"p\",null,{\"children\":\"Utah's tech ecosystem continues to grow despite national tech sector headcount reductions. Several factors support Wasatch Front employment stability:\"}]\n30:[\"$\",\"ul\",null,{\"children\":[[\"$\",\"li\",null,{\"children\":\"Utah's cost of business relative to California and Washington remains a powerful draw for corporate relocations and expansions\"}],[\"$\",\"li\",null,{\"children\":\"Major employers (Adobe, Workday, Domo, Qualtrics, and dozens of venture-backed startups) maintain significant Wasatch Front footprints\"}],[\"$\",\"li\",null,{\"children\":\"The University of Utah and BYU supply a consistent pipeline of STEM graduates who stay in-state\"}]]}]\n31:[\"$\",\"p\",null,{\"children\":\"A significant Silicon Slopes downturn would be the most material risk to Wasatch Front real estate — particularly in the Lehi-Draper-South Jordan corridor. Watch tech employment data as a leading indicator for this submarket.\"}]\n32:[\"$\",\"h2\",null,{\"children\":\"Migration and Population Growth\"}]\n33:[\"$\",\"p\",null,{\"children\":\"Utah continues to rank among the top states for domestic in-migration. The primary sources of new residents — California, Washington, Oregon, and Texas — bring household incomes and wealth levels that are accretive to the Utah market. Utah's population growth rate of approximately 1.5–2% per year is roughly twice the national average, sustaining long-term housing demand across the cycle.\"}]\n34:[\"$\",\"h2\",null,{\"children\":\"What Owners Should Do Now\"}]\n"])</script><script>self.__next_f.push([1,"35:[\"$\",\"ul\",null,{\"children\":[[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Owners
